<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noxora Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
font-family:'Inter',sans-serif;
background:linear-gradient(120deg,#020617,#0f172a,#1e3a8a,#9333ea);
color:white;
overflow-x:hidden;
}

/* HEADER */
header{
position:fixed;
top:0;
width:100%;
padding:15px;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(12px);
text-align:center;
z-index:1000;
}

/* HERO */
.hero{
padding:120px 20px 80px;
text-align:center;
}

.hero h1{
font-size:42px;
line-height:1.3;
}

.hero span{
color:#60a5fa;
}

/* BUTTON WITH BORDER ANIMATION */
.btn{
margin-top:30px;
padding:15px 35px;
border-radius:50px;
background:#111;
color:white;
text-decoration:none;
display:inline-block;
position:relative;
}

.btn::before{
content:"";
position:absolute;
top:-2px;left:-2px;right:-2px;bottom:-2px;
border-radius:50px;
background:linear-gradient(45deg,#facc15,#fde047,#facc15);
z-index:-1;
opacity:0;
animation:borderGlow 2s infinite;
}

@keyframes borderGlow{
0%{opacity:0;}
50%{opacity:1;}
100%{opacity:0;}
}

/* SECTION */
.section{
padding:80px 20px;
max-width:1100px;
margin:auto;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

/* CARD */
.card{
background:rgba(255,255,255,0.06);
padding:20px;
border-radius:15px;
transition:0.4s;
opacity:0;
transform:translateY(30px);
}

.card.show{
opacity:1;
transform:translateY(0);
}

.card:hover{
transform:translateY(-10px);
}

/* GRAPH */
.graph{
height:200px;
margin-top:20px;
border-radius:10px;
background:linear-gradient(transparent,rgba(59,130,246,0.5));
position:relative;
overflow:hidden;
}

.line{
position:absolute;
bottom:0;
width:100%;
height:2px;
background:#60a5fa;
animation:move 3s infinite linear;
}

@keyframes move{
0%{transform:translateX(-100%);}
100%{transform:translateX(100%);}
}

/* FOOTER */
footer{
padding:50px;
text-align:center;
color:#aaa;
}
</style>
</head>

<body>

<header>Noxora Studio</header>

<div class="hero">
<h1>Your <span>AI Growth</span> Creative Partner</h1>
<p>We build visuals that convert into real sales.</p>
<a class="btn" href="https://wa.me/91XXXXXXXXXX">Start Now</a>
</div>

<div class="section">
<h2>Services</h2>
<div class="grid">

<div class="card">Ad Creatives</div>
<div class="card">Branding & Logo</div>
<div class="card">Social Media</div>
<div class="card">Reels & Shorts</div>
<div class="card">Thumbnails</div>
<div class="card">Posters</div>

</div>
</div>

<div class="section">
<h2>Growth Visual</h2>
<div class="graph">
<div class="line"></div>
</div>
</div>

<div class="section">
<h2>Contact</h2>
<a class="btn" href="https://wa.me/91XXXXXXXXXX">Chat Now</a>
</div>

<footer>© 2026 Noxora Studio</footer>

<script>
// scroll animation
const cards = document.querySelectorAll('.card');
window.addEventListener('scroll', ()=>{
cards.forEach(card=>{
const rect = card.getBoundingClientRect();
if(rect.top < window.innerHeight - 50){
card.classList.add('show');
}
});
});
</script>

</body>
</html>
